name: Markdown Lint

on:
  push:
    branches: [ main ]
    paths: [ '**.md' ]
  pull_request:
    branches: [ main ]
    paths: [ '**.md' ]

jobs:
  lint:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules --ignore '.git'
        continue-on-error: true  # Warning only, don't fail the build yet

      - name: Run tool structure validator
        run: |
          if [ -f "scripts/validate_tools.py" ]; then
            python3 scripts/validate_tools.py
          fi
        continue-on-error: true
