site_name: QA Knowledge Base
site_url: https://kpietrzyk.github.io/qa_knowledge_base/
site_author: Krzysztof Pietrzyk
site_description: >-
  Praktyczna baza wiedzy QA dla manualnego testera aplikacji mobilnych
  który chce wejść w automatyzację i rozsądnie używać AI.

repo_name: kpietrzyk/qa_knowledge_base
repo_url: https://github.com/kpietrzyk/qa_knowledge_base
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

exclude_docs: |
  rag/qa-tool-schema.json
  rag/qa-tools-index.json

theme:
  name: material
  language: pl
  logo: https://api.iconify.design/material-symbols/bug-report-rounded.svg
  favicon: https://api.iconify.design/material-symbols/bug-report-rounded.svg

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Tryb ciemny
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Tryb jasny

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      lang:
        - pl
        - en
      separator: '[\s\-\.]+'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - tables
  - toc:
      permalink: true
      title: Na tej stronie
  - attr_list
  - md_in_html
  - footnotes
  - def_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kpietrzyk/qa_knowledge_base
      name: GitHub
  generator: false
  analytics:
    feedback:
      title: Czy ta strona była pomocna?
      ratings:
        - icon: material/thumb-up-outline
          name: Tak
          data: 1
          note: Dziękuję!
        - icon: material/thumb-down-outline
          name: Nie
          data: 0
          note: Jak możemy poprawić?

extra_css:
  - assets/extra.css

copyright: >
  <a href="https://github.com/kpietrzyk/qa_knowledge_base">QA Knowledge Base</a> —
  Praktyczny przewodnik dla testerów mobilnych

